name: Auto Podcast Generator

on:
  schedule:
    # 22:30 UTC 對應台灣早上 06:30
    - cron: '30 22 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行測試

jobs:
  build_podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許發布 Release 與 Commit

    steps:
      - name: 📥 下載專案程式碼
        uses: actions/checkout@v4
        
      - name: 🐍 設定 Python 執行環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: ⚙️ 安裝系統級混音套件 (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
        
      - name: 📦 安裝 Python 依賴套件
        run: pip install -r requirements.txt
        
      - name: 🎙️ 執行主要生成腳本 (AI寫稿、生成語音、混音)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 若您之後買了 ElevenLabs，把 API KEY 加進 Secret，就會自動啟用！
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }} 
        run: python main.py
          
      - name: 🚀 打包 MP3 上傳至 GitHub Releases 並更新 RSS (feed.xml)
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 讓腳本有權限操作您的專案
        run: |
          # 取得今天日期 (台灣時間)
          TODAY=$(TZ='Asia/Taipei' date +'%Y-%m-%d')
          ISO_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          echo "==== 計算音檔長度與大小 ===="
          # 使用 ffprobe 計算秒數
          DURATION=$(ffprobe -i TaiwanDaily_Podcast_Final.mp3 -show_entries format=duration -v quiet -of csv="p=0" | cut -d'.' -f1)
          if [ -z "$DURATION" ]; then DURATION=600; fi
          # 轉換成 HH:MM:SS
          FORMATTED_DURATION=$(printf "%02d:%02d:%02d\n" $(($DURATION/3600)) $(($DURATION%3600/60)) $(($DURATION%60)))
          
          # 取得檔案大小(bytes)
          FILE_SIZE=$(stat -c%s "TaiwanDaily_Podcast_Final.mp3")
          
          echo "==== 上傳音檔至 GitHub Release ===="
          # 發布一個 Release (把這集 mp3 丟上去當附件)
          # 使用 || true 避免同一天點兩次執行導致指令報錯中斷
          gh release create "ep-${TODAY}" TaiwanDaily_Podcast_Final.mp3 --title "Taiwan Daily Insider - ${TODAY}" --notes "Auto-generated daily podcast." || true
          
          echo "==== 更新 RSS Feed ===="
          # 把 mp3 的直接下載連結湊出來
          URL="https://github.com/${{ github.repository }}/releases/download/ep-${TODAY}/TaiwanDaily_Podcast_Final.mp3"
          
          # 從講稿抓出前三行當作這一集的介紹
          SUMMARY=$(head -n 5 script.txt | tr -d '\n' | tr -d '"' | tr -d "'")
          if [ -z "$SUMMARY" ]; then SUMMARY="Today's latest news and tech updates from Taiwan."; fi
          
          python core/rss_generator.py \
            --title "Taiwan Daily Insider - ${TODAY}" \
            --summary "$SUMMARY" \
            --date "$ISO_DATE" \
            --url "$URL" \
            --duration "$FORMATTED_DURATION" \
            --size "$FILE_SIZE"

      - name: 💾 將最新的 RSS XML 存檔 Commit 到專案中
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed.xml episodes.json
          # 如果沒有變更就不會報錯
          git commit -m "Auto-update podcast feed for ${TODAY}" || exit 0
          git push
