name: Auto Podcast Generator

on:
  schedule:
    # 22:00 UTC 對應台灣早上 06:00 (提早半小時起跑，緩衝 GitHub 排隊與 API 重試)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行測試

jobs:
  build_podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許發布 Release 與 Commit

    steps:
      - name: 📥 下載專案程式碼
        uses: actions/checkout@v4
        
      - name: 🐍 設定 Python 執行環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          
      - name: ⚙️ Setup ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: ⚙️ Verify ffmpeg
        run: ffmpeg -version

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests beautifulsoup4 feedparser python-dotenv google-genai edge-tts pydub audioop-lts podgen
        
      - name: 🎙️ 執行主要生成腳本 (AI寫稿、AI編輯、生成語音、混音、發送Email/Threads)
        timeout-minutes: 30
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python main.py

      # ==========================================
      # 🌟 新增：將產出的稿件與音檔打包存檔 (解決找不到 script.txt 的問題)
      # ==========================================
      - name: 📤 打包並上傳生成的稿件與音檔 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Podcast-Daily-Outputs
          path: |
            script.txt
            summary.txt
            TaiwanDaily_Podcast.mp3
            TaiwanDaily_Podcast_Final.mp3
          retention-days: 7 # 檔案會保留 7 天，之後自動刪除以節省空間

      - name: 🚀 打包 MP3 上傳至 GitHub Releases 並更新 RSS (feed.xml)
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 取得今天日期 (台灣時間)
          TODAY=$(TZ='Asia/Taipei' date +'%Y-%m-%d')
          ISO_DATE=$(TZ='Asia/Taipei' date +'%Y-%m-%dT%H:%M:%S+08:00')
          
          echo "==== 計算音檔長度與大小 ===="
          DURATION=$(ffprobe -i TaiwanDaily_Podcast_Final.mp3 -show_entries format=duration -v quiet -of csv="p=0" | cut -d'.' -f1)
          if [ -z "$DURATION" ]; then DURATION=600; fi
          FORMATTED_DURATION=$(printf "%02d:%02d:%02d\n" $(($DURATION/3600)) $(($DURATION%3600/60)) $(($DURATION%60)))
          FILE_SIZE=$(stat -c%s "TaiwanDaily_Podcast_Final.mp3")
          
          echo "==== 上傳音檔至 GitHub Release ===="
          gh release create "ep-${TODAY}" TaiwanDaily_Podcast_Final.mp3 --title "Taiwan Daily Insider - ${TODAY}" --notes "Auto-generated daily podcast." || true
          
          echo "==== 更新 RSS Feed ===="
          URL="https://github.com/${{ github.repository }}/releases/download/ep-${TODAY}/TaiwanDaily_Podcast_Final.mp3"
          SUMMARY=$(cat summary.txt | tr -d '"' | tr -d "'")
          if [ -z "$SUMMARY" ]; then SUMMARY="Today's latest news and tech updates from Taiwan."; fi
          
          python core/rss_generator.py \
            --title "Taiwan Daily Insider - ${TODAY}" \
            --summary "$SUMMARY" \
            --date "$ISO_DATE" \
            --url "$URL" \
            --duration "$FORMATTED_DURATION" \
            --size "$FILE_SIZE"

      - name: 💾 將最新的 RSS XML 存檔 Commit 到專案中
        run: |
          TODAY=$(TZ='Asia/Taipei' date +'%Y-%m-%d')
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed.xml episodes.json
          git commit -m "Auto-update podcast feed for ${TODAY}" || exit 0
          git pull --rebase origin main --autostash
          git push